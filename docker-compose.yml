services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: mibici
      POSTGRES_PASSWORD: mibici
      POSTGRES_DB: mibici
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mibici"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://mibici:mibici@db:5432/mibici
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    env_file:
      - ./backend/.env.example
    volumes:
      - ./frontend:/frontend:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
